<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfire | Storefront Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #3b82f6; --bg: #020617; --sidebar: #010409;
            --border: rgba(255, 255, 255, 0.08); --text: #f8fafc; --dim: #666;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        /* --- TOOL RAIL --- */
        .rail { width: 70px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 20px 0; z-index: 100; }
        .rail-icon { width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 15px; color: var(--dim); transition: 0.3s; font-size: 1.2rem; }
        .rail-icon:hover, .rail-icon.active { background: rgba(59, 130, 246, 0.1); color: var(--primary); box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); }

        /* --- CONTROL PANEL --- */
        .panel { width: 380px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .panel-header { padding: 25px; border-bottom: 1px solid var(--border); }
        .panel-content { flex: 1; overflow-y: auto; padding: 25px; }
        
        .section-tag { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: var(--dim); margin-bottom: 20px; display: block; }
        
        .group { margin-bottom: 25px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; margin-bottom: 8px; color: #cbd5e1; }
        input, select { width: 100%; background: #000; border: 1px solid var(--border); padding: 12px; color: white; border-radius: 10px; outline: none; font-size: 0.9rem; }
        input:focus { border-color: var(--primary); }

        /* --- LIVE FEED LOG --- */
        .live-feed { height: 150px; background: #000; border-top: 1px solid var(--border); padding: 15px; overflow-y: auto; font-size: 0.7rem; color: var(--primary); }
        .feed-entry { margin-bottom: 5px; opacity: 0.8; }
        .feed-entry span { color: var(--dim); margin-right: 8px; }

        /* --- PREVIEW AREA --- */
        .preview { flex: 1; background: #0f172a; display: flex; flex-direction: column; padding: 15px; position: relative; }
        .browser-top { background: #1e293b; padding: 10px 20px; border-radius: 12px 12px 0 0; display: flex; align-items: center; gap: 10px; }
        .circle { width: 10px; height: 10px; border-radius: 50%; background: #334155; }
        iframe { flex: 1; background: white; border: none; border-radius: 0 0 12px 12px; }

        .btn-deploy { position: fixed; bottom: 30px; right: 30px; background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 50px; font-weight: 800; cursor: pointer; box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3); z-index: 1000; }

        .hidden { display: none; }
        .pulse { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; display: inline-block; margin-right: 10px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <!-- Tool Rail (Global Menu) -->
    <div class="rail">
        <div class="rail-icon active" id="btn-theme" onclick="switchTab('theme')">🎨</div>
        <div class="rail-icon" id="btn-nav" onclick="switchTab('nav')">🔗</div>
        <div class="rail-icon" id="btn-prod" onclick="switchTab('prod')">📦</div>
        <a href="dashboard.html" class="rail-icon" style="margin-top: auto; text-decoration: none;">🏠</a>
    </div>

    <!-- Control Panel -->
    <div class="panel">
        <div class="panel-header">
            <h2 style="font-size: 1rem; font-weight: 800;">COMMAND_PANE</h2>
            <p style="font-size: 0.7rem; color: var(--dim);" class="mono"><span class="pulse"></span> LIVE_FEED_ACTIVE</p>
        </div>

        <div class="panel-content">
            <!-- Theme Settings Tab -->
            <div id="tab-theme" class="tab-content">
                <span class="section-tag">Global_Styling</span>
                <div class="group">
                    <label>Primary Brand Accent</label>
                    <input type="color" id="color-picker" style="height: 45px; padding: 5px;" onchange="logFeed('Color adjusted to ' + this.value)">
                </div>
                <div class="group">
                    <label>Announcement Bar Text</label>
                    <input type="text" id="announce-text" placeholder="Welcome to our store!">
                </div>
            </div>

            <!-- Navigation Tab -->
            <div id="tab-nav" class="tab-content hidden">
                <span class="section-tag">Main_Menu_Editor</span>
                <div id="menu-items-container">
                    <p class="mono" style="font-size: 0.7rem; color: var(--dim)">Loading store menus...</p>
                </div>
            </div>

            <!-- Product Tab -->
            <div id="tab-prod" class="tab-content hidden">
                <span class="section-tag">Catalog_Intelligence</span>
                <div id="product-list-container">
                    <p class="mono" style="font-size: 0.7rem; color: var(--dim)">Fetching products...</p>
                </div>
            </div>
        </div>

        <!-- System Feed -->
        <div class="live-feed mono" id="feed-box">
            <div class="feed-entry"><span>[SYSTEM]</span> Initializing visual link...</div>
        </div>
    </div>

    <!-- Live Preview -->
    <div class="preview">
        <div class="browser-top">
            <div class="circle"></div><div class="circle"></div><div class="circle"></div>
            <div id="url-display" class="mono" style="font-size: 0.6rem; color: var(--dim); margin-left: 10px;">HTTPS://LOADING...</div>
        </div>
        <iframe id="preview-frame" src=""></iframe>
        <button class="btn-deploy" onclick="deploy()">DEPLOY CHANGES</button>
    </div>

    <script>
        const SUPABASE_URL = "https://ajhbnmcqtkyvljrjicgw.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqaGJubWNxdGt5dmxqcmppY2d3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MjEwOTYsImV4cCI6MjA5NzA5NzA5Nn0.luJgBJvtASOMogTAhp4MPXXYfYrIXMALIKQfq_fIKNk";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let merchant = null;

        async function init() {
            const { data: { user } } = await _supabase.auth.getUser();
            const { data: profile } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
            merchant = profile;

            document.getElementById('url-display').innerText = `HTTPS://${profile.shopify_url.toUpperCase()}`;
            document.getElementById('preview-frame').src = `https://${profile.shopify_url}`;
            
            logFeed("Linked to " + profile.shopify_url);
            loadNav();
            loadProducts();
        }

        function switchTab(tabId) {
            // Hide all
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.rail-icon').forEach(i => i.classList.remove('active'));
            
            // Show target
            document.getElementById('tab-' + tabId).classList.remove('hidden');
            document.getElementById('btn-' + tabId).classList.add('active');
            logFeed("Switched to " + tabId.toUpperCase() + " controls");
        }

        function logFeed(msg) {
            const box = document.getElementById('feed-box');
            const now = new Date().toLocaleTimeString();
            box.innerHTML += `<div class="feed-entry"><span>[${now}]</span> ${msg}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        async function loadNav() {
            const res = await fetch('/api/shopify/navigation', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ shop_url: merchant.shopify_url, token: merchant.shopify_token })
            });
            const data = await res.json();
            const container = document.getElementById('menu-items-container');
            container.innerHTML = '';
            
            data.link_lists[0].links.forEach(link => {
                container.innerHTML += `
                    <div class="group">
                        <label>Link Label</label>
                        <input type="text" value="${link.title}">
                    </div>
                `;
            });
            logFeed("Global Navigation successfully parsed.");
        }

        async function loadProducts() {
            const res = await fetch('/api/shopify/products', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ shop_url: merchant.shopify_url, token: merchant.shopify_token })
            });
            const data = await res.json();
            const container = document.getElementById('product-list-container');
            container.innerHTML = '';
            
            data.products.forEach(p => {
                container.innerHTML += `
                    <div style="padding:10px; border:1px solid var(--border); border-radius:8px; margin-bottom:10px; font-size:0.8rem; cursor:pointer;" onclick="logFeed('Editing ${p.title}')">
                        ${p.title}
                    </div>
                `;
            });
            logFeed("Product Catalog fetched (" + data.products.length + " items)");
        }

        function deploy() {
            logFeed("INITIATING_PRODUCTION_PUSH...");
            setTimeout(() => logFeed("SUCCESS: STOREFRONT_LIVE"), 1500);
        }

        init();
    </script>
</body>
      </html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfire | Access Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- CSS VARIABLES --- */
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-400: #94a3b8;
            --slate-600: #475569;
            --slate-900: #0f172a;
            --white: #ffffff;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        /* --- RESET & BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--slate-50);
            color: var(--slate-900);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- AUTH CARD --- */
        .auth-card {
            background: var(--white);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: var(--shadow);
            text-align: center;
            border: 1px solid var(--slate-100);
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 2rem;
            text-decoration: none;
            color: var(--slate-900);
        }

        .logo-icon {
            width: 40px; height: 40px;
            background: var(--primary);
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
        }

        .logo-text { font-weight: 800; font-size: 1.5rem; letter-spacing: -1px; }

        h2 { font-size: 1.75rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -0.5px; }
        .subtitle { color: var(--slate-600); font-size: 0.95rem; margin-bottom: 2rem; }

        /* --- FORM ELEMENTS --- */
        .form-group { text-align: left; margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--slate-900); }
        
        input {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1px solid var(--slate-200);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            background: var(--slate-900);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        .btn:hover { background: var(--primary); transform: translateY(-1px); }

        .toggle-container { margin-top: 1.5rem; font-size: 0.9rem; color: var(--slate-600); }
        .toggle-link { color: var(--primary); font-weight: 700; cursor: pointer; }

        #error-msg {
            background: #fef2f2;
            color: #b91c1c;
            padding: 0.75rem;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: 1rem;
            display: none;
            border: 1px solid #fee2e2;
            text-align: left;
            line-height: 1.4;
        }

        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="auth-card">
        <a href="/" class="logo-area">
            <div class="logo-icon">S</div>
            <span class="logo-text">Starfire</span>
        </a>

        <h2 id="title">Welcome Back</h2>
        <p class="subtitle" id="subtitle">Log in to manage your store growth.</p>

        <form id="auth-form">
            <div class="form-group hidden" id="name-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your name">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@company.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="form-group hidden" id="store-group">
                <label for="store">Shopify Store URL</label>
                <input type="text" id="store" placeholder="your-store.myshopify.com">
            </div>

            <button type="submit" class="btn" id="submit-btn">Login to Starfire</button>
        </form>

        <div id="error-msg"></div>

        <div class="toggle-container">
            <span id="toggle-text">Don't have an account?</span>
            <span class="toggle-link" id="toggle-link">Sign up</span>
        </div>
    </div>

    <script>
        const form = document.getElementById('auth-form');
        const toggleLink = document.getElementById('toggle-link');
        const nameGroup = document.getElementById('name-group');
        const storeGroup = document.getElementById('store-group');
        const title = document.getElementById('title');
        const subtitle = document.getElementById('subtitle');
        const submitBtn = document.getElementById('submit-btn');
        const errorMsg = document.getElementById('error-msg');
        const toggleText = document.getElementById('toggle-text');

        let isLogin = true;

        toggleLink.onclick = () => {
            isLogin = !isLogin;
            nameGroup.classList.toggle('hidden');
            storeGroup.classList.toggle('hidden');
            
            if(!isLogin) {
                nameGroup.classList.add('fade-in');
                storeGroup.classList.add('fade-in');
            }

            title.innerText = isLogin ? "Welcome Back" : "Create Account";
            subtitle.innerText = isLogin ? "Log in to manage your store growth." : "Start your 14-day free trial today.";
            submitBtn.innerText = isLogin ? "Login to Starfire" : "Create My Account";
            toggleText.innerText = isLogin ? "Don't have an account?" : "Already have an account?";
            toggleLink.innerText = isLogin ? "Sign up" : "Log in";
            errorMsg.style.display = "none";
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            errorMsg.style.display = "none";
            submitBtn.innerText = "Connecting to Secure Server...";
            submitBtn.disabled = true;

            const payload = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                name: document.getElementById('name').value || "",
                shopify_store: document.getElementById('store').value || ""
            };

            const path = isLogin ? '/api/login' : '/api/signup';

            try {
                const response = await fetch(path, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('starfire_user', JSON.stringify(data));
                    window.location.href = '/dashboard.html';
                } else {
                    errorMsg.innerText = data.message || "Authentication failed. Please check your credentials.";
                    errorMsg.style.display = "block";
                }
            } catch (err) {
                console.error("Fetch Error:", err);
                // THE PRODUCTION FIX: Descriptive error for Render/Cloud
                errorMsg.innerHTML = "<b>SYSTEM HANDSHAKE ERROR</b><br>The server is currently waking up or the database is connecting. Please wait 10 seconds and try again.";
                errorMsg.style.display = "block";
            } finally {
                submitBtn.innerText = isLogin ? "Login to Starfire" : "Create My Account";
                submitBtn.disabled = false;
            }
        };
    </script>
</body>
</html>

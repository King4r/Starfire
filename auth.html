<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfire | Access Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- YOUR STARFIRE CSS VARIABLES --- */
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-400: #94a3b8;
            --slate-600: #475569;
            --slate-900: #0f172a;
            --white: #ffffff;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif; background-color: var(--slate-50); color: var(--slate-900);
            display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;
        }

        .auth-card {
            background: var(--white); width: 100%; max-width: 420px;
            padding: 2.5rem; border-radius: 24px; box-shadow: var(--shadow);
            text-align: center; border: 1px solid var(--slate-100);
        }

        .logo-area {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; margin-bottom: 2rem; text-decoration: none; color: var(--slate-900);
        }

        .logo-icon {
            width: 40px; height: 40px; background: var(--primary);
            color: white; border-radius: 10px; display: flex;
            align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem;
        }

        .logo-text { font-weight: 800; font-size: 1.5rem; letter-spacing: -1px; }
        h2 { font-size: 1.75rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -0.5px; }
        .subtitle { color: var(--slate-600); font-size: 0.95rem; margin-bottom: 2rem; }

        .form-group { text-align: left; margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--slate-900); }
        input {
            width: 100%; padding: 0.85rem 1rem; border: 1px solid var(--slate-200);
            border-radius: 12px; font-size: 1rem; transition: all 0.2s ease;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .btn {
            width: 100%; padding: 1rem; background: var(--slate-900); color: white;
            border: none; border-radius: 12px; font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: all 0.3s ease; margin-top: 0.5rem;
        }
        .btn:hover { background: var(--primary); transform: translateY(-1px); }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; }

        .toggle-container { margin-top: 1.5rem; font-size: 0.9rem; color: var(--slate-600); }
        .toggle-link { color: var(--primary); font-weight: 700; cursor: pointer; text-decoration: none; }

        #error-msg {
            background: #fef2f2; color: #b91c1c; padding: 0.75rem; border-radius: 10px;
            font-size: 0.85rem; font-weight: 500; margin-top: 1rem; display: none; border: 1px solid #fee2e2;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="auth-card">
        <a href="/" class="logo-area">
            <div class="logo-icon">S</div>
            <span class="logo-text">Starfire</span>
        </a>

        <h2 id="title">Welcome Back</h2>
        <p class="subtitle" id="subtitle">Log in to manage your store growth.</p>

        <form id="auth-form">
            <!-- SIGNUP ONLY FIELDS -->
            <div class="form-group hidden" id="name-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="John Doe">
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="name@store.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <!-- SIGNUP ONLY FIELDS -->
            <div class="form-group hidden" id="store-group">
                <label>Shopify Store URL</label>
                <input type="text" id="store" placeholder="your-store.myshopify.com">
            </div>

            <button type="submit" class="btn" id="submit-btn">Login to Starfire</button>
        </form>

        <div id="error-msg"></div>

        <div class="toggle-container">
            <span id="toggle-text">Don't have an account?</span>
            <span class="toggle-link" id="toggle-link">Sign up</span>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ajhbnmcqtkyvljrjicgw.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqaGJubWNxdGt5dmxqcmppY2d3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MjEwOTYsImV4cCI6MjA5NzA5NzA5Nn0.luJgBJvtASOMogTAhp4MPXXYfYrIXMALIKQfq_fIKNk";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const form = document.getElementById('auth-form');
        const toggleLink = document.getElementById('toggle-link');
        const nameGroup = document.getElementById('name-group');
        const storeGroup = document.getElementById('store-group');
        const title = document.getElementById('title');
        const subtitle = document.getElementById('subtitle');
        const submitBtn = document.getElementById('submit-btn');
        const errorMsg = document.getElementById('error-msg');
        const toggleText = document.getElementById('toggle-text');

        let isLogin = true;

        // --- TOGGLE UI BETWEEN LOGIN AND SIGNUP ---
        toggleLink.onclick = () => {
            isLogin = !isLogin;
            
            // Show/Hide signup fields
            nameGroup.classList.toggle('hidden');
            storeGroup.classList.toggle('hidden');

            // Update text labels
            title.innerText = isLogin ? "Welcome Back" : "Create Account";
            subtitle.innerText = isLogin ? "Log in to manage your store growth." : "Join Starfire and automate your scaling.";
            submitBtn.innerText = isLogin ? "Login to Starfire" : "Create My Account";
            toggleText.innerText = isLogin ? "Don't have an account?" : "Already have an account?";
            toggleLink.innerText = isLogin ? "Sign up" : "Log in";
            
            errorMsg.style.display = "none";
        };

        // --- HANDLE SUBMISSION ---
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            errorMsg.style.display = "none";
            submitBtn.innerText = "Authenticating...";
            submitBtn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('name').value;
            const shopUrl = document.getElementById('store').value;

            try {
                if (isLogin) {
                    // 1. SUPABASE LOGIN
                    const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    window.location.replace('/dashboard.html');
                } else {
                    // 2. SUPABASE SIGNUP
                    const { data: authData, error: authError } = await _supabase.auth.signUp({
                        email, 
                        password,
                        options: { data: { full_name: fullName } }
                    });

                    if (authError) throw authError;

                    if (authData.user) {
                        // 3. CREATE PROFILE IN DATABASE
                        const { error: dbError } = await _supabase
                            .from('profiles')
                            .insert([{ 
                                id: authData.user.id, 
                                email: email, 
                                full_name: fullName,
                                shopify_url: shopUrl 
                            }]);
                        
                        if (dbError) throw dbError;
                        
                        // Signup success - most Supabase projects require email confirmation.
                        // If confirmation is OFF in your settings, this redirect will work instantly.
                        alert("Account created! Check your email to confirm, then Login.");
                        location.reload(); 
                    }
                }
            } catch (err) {
                errorMsg.innerText = err.message;
                errorMsg.style.display = "block";
                submitBtn.innerText = isLogin ? "Login to Starfire" : "Create My Account";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>

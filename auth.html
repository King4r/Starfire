<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfire | Access Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #3b82f6; --primary-dark: #2563eb;
            --bg-page: #020617; --bg-card: #ffffff;
            --text-main: #0f172a; --text-muted: #64748b;
            --border: #e2e8f0; --radius: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif; background-color: var(--bg-page);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 1.5rem;
        }
        .auth-container {
            background: var(--bg-card); width: 100%; max-width: 400px;
            padding: 2.5rem; border-radius: 24px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .logo-mark {
            width: 40px; height: 40px; background: var(--primary); color: white;
            border-radius: 10px; display: inline-flex; align-items: center;
            justify-content: center; font-weight: 800; font-size: 1.2rem; margin-bottom: 1.5rem;
        }
        h2 { font-size: 1.5rem; font-weight: 800; color: var(--text-main); margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; }
        .field { text-align: left; margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.75rem; font-weight: 700; margin-bottom: 0.5rem; text-transform: uppercase; }
        input {
            width: 100%; padding: 0.85rem 1rem; border: 1px solid var(--border);
            border-radius: var(--radius); font-size: 1rem; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .btn-submit {
            width: 100%; padding: 1rem; background: var(--text-main); color: white;
            border: none; border-radius: var(--radius); font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: 0.2s; margin-top: 1rem;
        }
        .btn-submit:hover { background: var(--primary-dark); transform: translateY(-1px); }
        #error-ui {
            background: #fff1f2; color: #e11d48; padding: 1rem; border-radius: 12px;
            font-size: 0.8rem; font-weight: 600; margin-top: 1rem; display: none;
        }
        .hidden { display: none; }
        .toggle-link { margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted); }
        .link-accent { color: var(--primary); font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo-mark">S</div>
        <h2 id="heading">Welcome Back</h2>
        <p class="subtitle" id="sub-heading">Access your Starfire dashboard.</p>

        <form id="auth-form">
            <div class="field hidden" id="name-field">
                <label>Merchant Name</label>
                <input type="text" id="user-name" placeholder="John Doe">
            </div>
            <div class="field">
                <label>Email Address</label>
                <input type="email" id="user-email" placeholder="name@store.com" required>
            </div>
            <div class="field">
                <label>Secure Password</label>
                <input type="password" id="user-pass" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-submit" id="btn-text">Sign In</button>
        </form>

        <div id="error-ui"></div>

        <div class="toggle-link">
            <span id="toggle-label">First time here?</span>
            <span class="link-accent" id="toggle-action">Create Account</span>
        </div>
    </div>

    <script>
        // --- INJECTED CLOUD KEYS ---
        const SUPABASE_URL = "https://ajhbnmcqtkyvljrjicgw.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqaGJubWNxdGt5dmxqcmppY2d3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MjEwOTYsImV4cCI6MjA5NzA5NzA5Nn0.luJgBJvtASOMogTAhp4MPXXYfYrIXMALIKQfq_fIKNk";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const form = document.getElementById('auth-form');
        const toggleAction = document.getElementById('toggle-action');
        const nameField = document.getElementById('name-field');
        const btnText = document.getElementById('btn-text');
        const errorUi = document.getElementById('error-ui');

        let isLoginMode = true;

        toggleAction.onclick = () => {
            isLoginMode = !isLoginMode;
            nameField.classList.toggle('hidden');
            document.getElementById('heading').innerText = isLoginMode ? "Welcome Back" : "Start Growing";
            btnText.innerText = isLoginMode ? "Sign In" : "Initialize Account";
            toggleAction.innerText = isLoginMode ? "Create Account" : "Sign In";
            errorUi.style.display = "none";
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            errorUi.style.display = "none";
            btnText.innerText = "Authenticating...";

            const email = document.getElementById('user-email').value;
            const password = document.getElementById('user-pass').value;
            const fullName = document.getElementById('user-name').value;

            try {
                if (isLoginMode) {
                    const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    window.location.replace('/dashboard.html');
                } else {
                    const { data: authData, error: authError } = await _supabase.auth.signUp({ 
                        email, password, options: { data: { full_name: fullName } }
                    });
                    if (authError) throw authError;

                    if (authData.user) {
                        // Create the profile entry automatically
                        await _supabase.from('profiles').insert([{ id: authData.user.id, email, full_name: fullName }]);
                        window.location.replace('/dashboard.html');
                    }
                }
            } catch (err) {
                errorUi.innerText = err.message;
                errorUi.style.display = "block";
                btnText.innerText = isLoginMode ? "Sign In" : "Initialize Account";
            }
        };
    </script>
</body>
</html>

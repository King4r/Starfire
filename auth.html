<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfire | Access Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- REFACTORED CSS VARIABLES --- */
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-page: #020617; /* Deep Slate for high-end look */
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --error-bg: #fff1f2;
            --error-text: #e11d48;
            --radius: 12px;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- BASE RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
        }

        /* --- LAYOUT --- */
        .auth-container {
            background: var(--bg-card);
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .logo-group {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            text-decoration: none;
            color: var(--text-main);
        }

        .logo-mark {
            width: 38px; height: 38px;
            background: var(--primary);
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.1rem;
        }

        .logo-text { font-weight: 800; font-size: 1.4rem; letter-spacing: -0.05em; }

        h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; }

        /* --- FORM ELEMENTS --- */
        .form-stack { text-align: left; }
        .field-group { margin-bottom: 1.25rem; }
        
        label { 
            display: block; font-size: 0.8rem; font-weight: 700; 
            margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: var(--text-main);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 0.5rem;
        }

        .btn-submit:hover { background: var(--primary); transform: translateY(-1px); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; filter: grayscale(1); }

        /* --- UTILITIES --- */
        .footer-link { margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted); }
        .link-accent { color: var(--primary); font-weight: 700; cursor: pointer; text-decoration: none; }

        #error-ui {
            background: var(--error-bg);
            color: var(--error-text);
            padding: 1rem;
            border-radius: var(--radius);
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 1.25rem;
            display: none;
            border: 1px solid rgba(225, 29, 72, 0.1);
            text-align: left;
            line-height: 1.5;
        }

        .hidden { display: none; }
        .animate-slide { animation: slide 0.3s ease-out forwards; }
        @keyframes slide { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="auth-container">
        <a href="/" class="logo-group">
            <div class="logo-mark">S</div>
            <span class="logo-text">Starfire</span>
        </a>

        <h2 id="heading">Welcome Back</h2>
        <p class="subtitle" id="sub-heading">Access your merchant command center.</p>

        <form id="auth-form" class="form-stack">
            <div class="field-group hidden" id="name-field">
                <label>Full Name</label>
                <input type="text" id="user-name" placeholder="John Doe">
            </div>

            <div class="field-group">
                <label>Email Address</label>
                <input type="email" id="user-email" placeholder="name@store.com" required>
            </div>

            <div class="field-group">
                <label>Password</label>
                <input type="password" id="user-pass" placeholder="••••••••" required>
            </div>

            <div class="field-group hidden" id="store-field">
                <label>Shopify Domain</label>
                <input type="text" id="user-store" placeholder="my-store.myshopify.com">
            </div>

            <button type="submit" class="btn-submit" id="btn-text">Login to Starfire</button>
        </form>

        <div id="error-ui"></div>

        <div class="footer-link">
            <span id="toggle-label">New to the system?</span>
            <span class="link-accent" id="toggle-action">Create Account</span>
        </div>
    </div>

    <script>
        const form = document.getElementById('auth-form');
        const toggleAction = document.getElementById('toggle-action');
        const nameField = document.getElementById('name-field');
        const storeField = document.getElementById('store-field');
        const btnText = document.getElementById('btn-text');
        const errorUi = document.getElementById('error-ui');

        let isLoginMode = true;

        toggleAction.onclick = () => {
            isLoginMode = !isLoginMode;
            nameField.classList.toggle('hidden');
            storeField.classList.toggle('hidden');
            
            if(!isLoginMode) {
                nameField.classList.add('animate-slide');
                storeField.classList.add('animate-slide');
            }

            document.getElementById('heading').innerText = isLoginMode ? "Welcome Back" : "Initialize Account";
            document.getElementById('sub-heading').innerText = isLoginMode ? "Access your merchant command center." : "Connect your store to the Starfire grid.";
            btnText.innerText = isLoginMode ? "Login to Starfire" : "Create My Account";
            document.getElementById('toggle-label').innerText = isLoginMode ? "New to the system?" : "Already verified?";
            toggleAction.innerText = isLoginMode ? "Create Account" : "Login";
            errorUi.style.display = "none";
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            errorUi.style.display = "none";
            btnText.innerText = "Synchronizing...";
            btnText.disabled = true;

            const payload = {
                email: document.getElementById('user-email').value,
                password: document.getElementById('user-pass').value,
                name: document.getElementById('user-name').value || "",
                shopify_store: document.getElementById('user-store').value || ""
            };

            const endpoint = isLoginMode ? '/api/login' : '/api/signup';

            try {
                // Use relative path for Render stability
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('starfire_user', JSON.stringify(data));
                    window.location.replace('/dashboard.html');
                } else {
                    errorUi.innerText = data.message || "Protocol mismatch. Check credentials.";
                    errorUi.style.display = "block";
                    btnText.innerText = isLoginMode ? "Login" : "Sign Up";
                    btnText.disabled = false;
                }
            } catch (err) {
                // RENDER SPECIFIC ERROR HANDLING
                console.error("Link Error:", err);
                errorUi.innerHTML = "<b>SYSTEM HANDSHAKE DELAY</b><br>The secure cloud is waking up. This usually takes 30 seconds on the first load. Please do not refresh; click the button again in a moment.";
                errorUi.style.display = "block";
                btnText.innerText = "Retry Connection";
                btnText.disabled = false;
            }
        };
    </script>
</body>
</html>

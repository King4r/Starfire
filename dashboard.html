<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfire | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #2563eb;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-700: #334155;
            --slate-900: #0f172a;
            --white: #ffffff;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--slate-50); color: var(--slate-900); display: flex; min-height: 100vh; }

        /* --- SIDEBAR --- */
        aside {
            width: var(--sidebar-width);
            background: var(--slate-900);
            color: white;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .logo { font-weight: 800; font-size: 1.5rem; margin-bottom: 3rem; display: flex; align-items: center; gap: 10px; }
        .logo-icon { width: 32px; height: 32px; background: var(--primary); border-radius: 8px; }

        nav { display: flex; flex-direction: column; gap: 0.5rem; flex: 1; }
        nav a { color: #94a3b8; text-decoration: none; padding: 0.8rem 1rem; border-radius: 10px; font-weight: 500; transition: 0.3s; }
        nav a.active { background: var(--primary); color: white; }
        nav a:hover:not(.active) { background: rgba(255,255,255,0.05); color: white; }

        /* --- MAIN CONTENT --- */
        main { margin-left: var(--sidebar-width); flex: 1; padding: 2.5rem; width: calc(100% - var(--sidebar-width)); }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; }
        .welcome h1 { font-size: 1.75rem; font-weight: 800; letter-spacing: -0.5px; }
        .welcome p { color: var(--slate-700); font-size: 0.9rem; }

        /* --- STATS GRID --- */
        .stats-grid { display: grid; grid-template-cols: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: white; padding: 1.5rem; border-radius: 16px; border: 1px solid var(--slate-200); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .stat-card h4 { font-size: 0.75rem; text-transform: uppercase; color: var(--slate-700); letter-spacing: 1px; margin-bottom: 0.5rem; }
        .stat-card p { font-size: 1.5rem; font-weight: 800; }

        /* --- GRAPH FIX --- */
        .chart-container { 
            background: white; 
            padding: 2rem; 
            border-radius: 20px; 
            border: 1px solid var(--slate-200); 
            margin-bottom: 2rem;
            position: relative;
            height: 400px; /* Fixed height prevents graph jumping */
            width: 100%;
        }

        .data-tables { display: grid; grid-template-cols: 1fr 1fr; gap: 1.5rem; }
        .table-card { background: white; padding: 1.5rem; border-radius: 16px; border: 1px solid var(--slate-200); }
        .table-card h3 { margin-bottom: 1rem; font-size: 1.1rem; }

        @media (max-width: 900px) {
            aside { display: none; }
            main { margin-left: 0; width: 100%; padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <aside>
        <div class="logo"><div class="logo-icon"></div> Starfire</div>
        <nav>
            <a href="dashboard.html" class="active">Dashboard</a>
            <a href="settings.html">AI Studio</a>
            <a href="settings.html">Growth Suite</a>
            <a href="settings.html">Settings</a>
        </nav>
        <div onclick="logout()" style="margin-top: auto; font-size: 0.8rem; color: #475569; cursor: pointer;">Logout →</div>
    </aside>

    <main>
        <header>
            <div class="welcome">
                <h1>Hello, <span id="merchant-name" style="color: var(--primary);">Merchant</span></h1>
                <p id="store-url">Synchronizing system data...</p>
            </div>
            <div id="connection-status" style="font-size: 0.8rem; font-weight: bold; color: #ef4444;">
                ● OFFLINE
            </div>
        </header>

        <section class="stats-grid">
            <div class="stat-card"><h4>Total Sales</h4><p id="stat-sales">$0.00</p></div>
            <div class="stat-card"><h4>Inventory</h4><p id="stat-inv">0 Units</p></div>
            <div class="stat-card"><h4>Orders</h4><p id="stat-orders">0</p></div>
            <div class="stat-card"><h4>Customers</h4><p id="stat-cust">0</p></div>
        </section>

        <div class="chart-container">
            <h3 style="margin-bottom: 1.5rem; font-size: 0.9rem; color: var(--slate-700); text-transform: uppercase;">Revenue Analytics</h3>
            <canvas id="salesChart"></canvas>
        </div>

        <div class="data-tables">
            <div class="table-card">
                <h3>Product Details</h3>
                <p style="color: var(--slate-400); font-size: 0.9rem;">Live data stream disconnected.</p>
            </div>
            <div class="table-card">
                <h3>Recent Orders</h3>
                <p style="color: var(--slate-400); font-size: 0.9rem;">Connect API in settings.</p>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://ajhbnmcqtkyvljrjicgw.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqaGJubWNxdGt5dmxqcmppY2d3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MjEwOTYsImV4cCI6MjA5NzA5NzA5Nn0.luJgBJvtASOMogTAhp4MPXXYfYrIXMALIKQfq_fIKNk";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let myChart = null;

        async function initDashboard() {
            // 1. Auth Check
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { window.location.replace('auth.html'); return; }

            // 2. Fetch User Profile
            const { data: profile } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
            
            if (profile) {
                document.getElementById('merchant-name').innerText = profile.full_name || "Merchant";
                
                // 3. Real Data Sync Logic
                if (profile.shopify_token && profile.shopify_url) {
                    document.getElementById('connection-status').innerText = '● LIVE';
                    document.getElementById('connection-status').style.color = '#10b981';
                    document.getElementById('store-url').innerText = profile.shopify_url;
                    
                    fetchLiveShopifyData(profile.shopify_url, profile.shopify_token);
                } else {
                    document.getElementById('store-url').innerText = "Shopify not linked.";
                }
            }
        }

        async function fetchLiveShopifyData(shop, token) {
            try {
                const response = await fetch('/api/shopify/data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ shop_url: shop, access_token: token })
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('stat-sales').innerText = `$${data.total_sales}`;
                    document.getElementById('stat-inv').innerText = `${data.total_inventory} Units`;
                    document.getElementById('stat-orders').innerText = data.order_count;
                    document.getElementById('stat-cust').innerText = data.customer_count;
                    
                    if(data.chart_data) updateGraph(data.chart_data);
                }
            } catch (err) {
                console.error("Live Sync Error:", err);
            }
        }

        function initGraph() {
            const ctx = document.getElementById('salesChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{
                        label: 'Revenue',
                        data: [0, 0, 0, 0, 0, 0, 0],
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.05)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false, // Allows the container to control height
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { beginAtZero: true, grid: { color: '#f1f5f9' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        function updateGraph(newData) {
            if (myChart) {
                myChart.data.datasets[0].data = newData;
                myChart.update();
            }
        }

        async function logout() {
            await _supabase.auth.signOut();
            window.location.replace('index.html');
        }

        // Run
        initGraph();
        initDashboard();
    </script>
</body>
              </html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfire Founder | Direct Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #050505; --card: #0a0a0a; --blue: #3b82f6; --border: #1a1a1a; --text: #f8fafc; --dim: #666666; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Auth Gate */
        #gate { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .gate-card { background: var(--card); padding: 3rem; border: 1px solid var(--border); text-align: center; width: 350px; }
        .gate-input { background: #000; border: 1px solid var(--blue); padding: 12px; color: var(--blue); width: 100%; text-align: center; font-family: 'JetBrains Mono'; outline: none; margin-top: 1.5rem; }

        /* Dashboard */
        #admin-app { display: none; padding: 3rem; max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3rem; border-bottom: 1px solid var(--border); padding-bottom: 2rem; }
        .stat-grid { display: grid; grid-template-cols: repeat(auto-fit, minmax(240px, 1fr)); gap: 1rem; margin-bottom: 3rem; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 1.5rem; }
        .label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: var(--dim); margin-bottom: 0.5rem; }
        .val { font-size: 2rem; font-weight: 800; color: white; }

        .chart-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 1rem; margin-bottom: 2rem; }
        .chart-card { background: var(--card); border: 1px solid var(--border); padding: 1.5rem; height: 300px; }

        table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--border); }
        th { text-align: left; padding: 1rem; color: var(--dim); font-size: 0.7rem; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 1rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; color: #cbd5e1; }
    </style>
</head>
<body>

    <div id="gate">
        <div class="gate-card">
            <h2 class="mono">SYSTEM_FOUNDER_AUTH</h2>
            <input type="password" id="pass" class="gate-input" placeholder="ACCESS_CODE" onkeyup="if(event.key==='Enter') auth()">
            <button onclick="auth()" style="margin-top: 1rem; background: var(--blue); color: white; border: none; padding: 12px; font-weight: 800; cursor: pointer; width: 100%;">AUTHORIZE</button>
        </div>
    </div>

    <div id="admin-app">
        <header>
            <h1 class="mono">STARFIRE_FOUNDER_OS_V4</h1>
            <p id="sync-time" class="mono" style="color: var(--blue); font-size: 0.7rem;">STATUS: CLOUD_DIRECT_ACTIVE</p>
        </header>

        <div class="stat-grid">
            <div class="stat-card"><div class="label">Merchants</div><div class="val mono" id="stat-users">0</div></div>
            <div class="stat-card"><div class="label">Platform Sales</div><div class="val mono" id="stat-sales">$0.00</div></div>
            <div class="stat-card"><div class="label">Total Orders</div><div class="val mono" id="stat-orders">0</div></div>
        </div>

        <div class="chart-grid">
            <div class="chart-card"><canvas id="growthChart"></canvas></div>
            <div class="chart-card"><canvas id="trafficChart"></canvas></div>
        </div>

        <table>
            <thead><tr><th>Merchant</th><th>Store_URL</th><th>Integrations</th><th>Revenue</th></tr></thead>
            <tbody id="user-rows"></tbody>
        </table>
    </div>

    <script>
        const SUPABASE_URL = "https://ajhbnmcqtkyvljrjicgw.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqaGJubWNxdGt5dmxqcmppY2d3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MjEwOTYsImV4cCI6MjA5NzA5NzA5Nn0.luJgBJvtASOMogTAhp4MPXXYfYrIXMALIKQfq_fIKNk";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let charts = {};

        async function auth() {
            const pass = document.getElementById('pass').value;
            // CALL SUPABASE RPC DIRECTLY
            const { data, error } = await _supabase.rpc('get_admin_stats', { admin_key: pass });

            if (error) {
                alert("ACCESS_DENIED");
                console.error(error);
            } else {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('admin-app').style.display = 'block';
                populateDashboard(data);
            }
        }

        function populateDashboard(data) {
            document.getElementById('stat-users').innerText = data.global_users;
            document.getElementById('stat-sales').innerText = `$${data.global_sales.toLocaleString()}`;
            document.getElementById('stat-orders').innerText = data.global_orders;

            const tbody = document.getElementById('user-rows');
            tbody.innerHTML = '';
            data.users.forEach(u => {
                tbody.innerHTML += `<tr>
                    <td class="mono" style="color: white;">${u.full_name}<br><span style="font-size:0.7rem;color:var(--dim)">${u.email}</span></td>
                    <td style="color: var(--blue)">${u.shopify_url || '---'}</td>
                    <td>${u.is_ready ? '🟢 CONNECTED' : '🟡 PENDING'}</td>
                    <td class="mono">$${u.total_sales.toLocaleString()}</td>
                </tr>`;
            });

            renderChart('growthChart', data.growth_chart, '#3b82f6', 'line');
            renderChart('trafficChart', data.traffic_chart, '#ffffff', 'bar');
        }

        function renderChart(id, chartData, color, type) {
            const ctx = document.getElementById(id).getContext('2d');
            if(charts[id]) charts[id].destroy();
            charts[id] = new Chart(ctx, {
                type: type,
                data: {
                    labels: chartData.labels,
                    datasets: [{ data: chartData.values, borderColor: color, backgroundColor: color + '11', borderWidth: 2, tension: 0.4, fill: true }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
                    scales: { x: { grid: { display: false }, ticks: { color: '#333' } }, y: { grid: { color: '#111' }, ticks: { color: '#333' } } }
                }
            });
        }
    </script>
</body>
                                                                                   </html>
